version: '3.8'

services:
  backend:
    build: .
    container_name: driver_assist_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_BACKEND=sqlite  # Set to 'mysql' to use MySQL
      - SQLITE_DATABASE=/app/db/driver_assist.db
      # MySQL environment variables (uncomment and edit if using MySQL)
      # - MYSQL_HOST=db
      # - MYSQL_PORT=3306
      # - MYSQL_USER=root
      # - MYSQL_PASSWORD=rootpassword
      # - MYSQL_DATABASE=driver_assist
    volumes:
      - sqlite_data:/app/db
    restart: always

# Optional: Uncomment the db service to run a MySQL container alongside the backend
#   db:
#     image: mysql:8.0
#     container_name: driver_assist_db
#     environment:
#       - MYSQL_ROOT_PASSWORD=rootpassword
#       - MYSQL_DATABASE=driver_assist
#     ports:
#       - "3306:3306"
#     volumes:
#       - mysql_data:/var/lib/mysql
#     restart: always

volumes:
  sqlite_data:
#  mysql_data:
